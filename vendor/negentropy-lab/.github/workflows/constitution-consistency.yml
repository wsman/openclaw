name: Constitution And Consistency Checks

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 0 * * *'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Enable Husky prepare hooks
        run: npm run prepare --if-present

      - name: Type check
        run: npm run typecheck

      - name: Constitution compliance check
        run: npm run check:constitution

      - name: Doc-code consistency check (strict)
        run: npm run check:consistency -- --timeout-ms 120000

      - name: Upload compliance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: constitution-consistency-reports
          path: |
            constitution-compliance-report.json
            reports/consistency-check-report.json
            reports/consistency-check-report.html
          if-no-files-found: warn
