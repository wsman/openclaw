name: Gateway Performance Pipeline

on:
  schedule:
    - cron: '30 1 * * 1'
  workflow_dispatch:

jobs:
  perf-specialized:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci --ignore-scripts

      - name: Performance benchmark suite
        run: bash ./scripts/run-performance-tests.sh --quick

      - name: Soak smoke
        run: ./scripts/ws-soak.sh --iterations 1 --interval-sec 1

      - name: Performance baseline
        run: ./scripts/ws-perf-baseline.sh

      - name: Generate weekly report
        run: node ./scripts/perf-weekly-report.js --enforce --lookback-days 7 --max-perf-duration-sec 180 --min-soak-pass-rate 1

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-performance-pipeline
          path: |
            reports/ws-soak-*.json
            reports/ws-soak-*.log
            reports/ws-perf-baseline-*.json
            reports/ws-perf-baseline-*.log
            reports/performance-weekly-report.json
            reports/performance-weekly-report.md
          if-no-files-found: warn
