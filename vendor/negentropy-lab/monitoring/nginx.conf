# Negentropy-Lab Nginx 统一入口代理配置
# 版本: v1.0.0
# 宪法依据: §102熵减原则、§306零停机协议
# 设计目标: 单端口转发所有服务，支持 WebSocket

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript 
               application/xml application/xml+rss text/javascript application/x-javascript;

    # 上游服务器定义
    upstream gateway {
        server gateway:4514;
        keepalive 32;
    }

    upstream prometheus {
        server prometheus:9090;
        keepalive 16;
    }

    upstream alertmanager {
        server alertmanager:9093;
        keepalive 16;
    }

    upstream grafana {
        server grafana:3000;
        keepalive 16;
    }

    upstream loki {
        server loki:3100;
        keepalive 16;
    }

    # 速率限制区域
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=50r/s;

    server {
        listen 80;
        server_name localhost gateway.negentropy-lab.org;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ==================== 健康检查 ====================
        location /health {
            access_log off;
            return 200 '{"status":"healthy","timestamp":"$time_iso8601"}';
            add_header Content-Type application/json;
        }

        location /nginx-status {
            access_log off;
            allow 127.0.0.1;
            deny all;
            stub_status on;
        }

        # ==================== Gateway 主服务 ====================
        # WebSocket 升级支持
        location /ws {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket 超时配置
            proxy_connect_timeout 60s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;
            
            # 速率限制
            limit_req zone=ws_limit burst=20 nodelay;
        }

        # Gateway HTTP API
        location / {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 连接保持
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # 速率限制
            limit_req zone=api_limit burst=50 nodelay;
        }

        # ==================== Prometheus 监控 ====================
        location /api/prometheus/ {
            rewrite ^/api/prometheus/(.*) /$1 break;
            proxy_pass http://prometheus;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Prometheus 查询可能较慢
            proxy_read_timeout 120s;
        }

        # ==================== AlertManager 告警 ====================
        location /api/alerts/ {
            rewrite ^/api/alerts/(.*) /$1 break;
            proxy_pass http://alertmanager;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ==================== Grafana 仪表盘 ====================
        location /monitoring/ {
            rewrite ^/monitoring/(.*) /$1 break;
            proxy_pass http://grafana;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Grafana WebSocket 支持 (live tail)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Grafana 根路径重定向
        location = /monitoring {
            return 301 /monitoring/;
        }

        # ==================== Loki 日志 ====================
        location /api/logs/ {
            rewrite ^/api/logs/(.*) /$1 break;
            proxy_pass http://loki;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Loki 查询可能较大
            client_max_body_size 100m;
            proxy_read_timeout 60s;
        }

        # ==================== 错误页面 ====================
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}