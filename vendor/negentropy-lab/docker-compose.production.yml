# Negentropy-Lab Gateway 鐢熶骇绾х紪鎺掗厤缃?
# 鐗堟湰: v1.0.0
# 瀹硶渚濇嵁: 搂102鐔靛噺鍘熷垯銆伮?06闆跺仠鏈哄崗璁€伮?10鍗忎綔鏁堢巼鍏悊
# 璁捐鐩爣: 鐢熶骇鐜澶氬鍣ㄧ紪鎺掞紝鏀寔闆跺仠鏈洪儴缃?

version: '3.8'

# 鑷畾涔夌綉缁滐紝纭繚鏈嶅姟闂翠綆寤惰繜閫氫俊
networks:
  negentropy-production:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

# 鍏变韩鍗峰畾涔?
volumes:
  gateway-logs:
    driver: local
  prometheus-data:
    driver: local
  alertmanager-data:
    driver: local
  grafana-data:
    driver: local
  constitution-audit-logs:
    driver: local

services:
  # ========== Gateway涓绘湇鍔?==========
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.production
      args:
        - BUILD_TIMESTAMP=${BUILD_TIMESTAMP:-$(date -u +%Y%m%d%H%M%S)}
    container_name: negentropy-gateway-prod
    hostname: gateway-prod
    ports:
      - "4514:4514"
    networks:
      - negentropy-production
    environment:
      # 鏍稿績鐜鍙橀噺
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=4514
      - LOG_LEVEL=info
      
      # 瀹硶渚濇嵁: 搂108寮傛瀯妯″瀷绛栫暐 - 鏄惧紡鎸囧畾妯″瀷鍙傛暟
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-2048}
      
      # 璁よ瘉閰嶇疆
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      
      # 鐩戞帶閰嶇疆
      - ENABLE_METRICS=true
      - METRICS_PORT=9100
      - ENABLE_HEALTH_CHECKS=true
      
      # 闊ф€ч厤缃?
      - CIRCUIT_BREAKER_ENABLED=true
      - RATE_LIMITER_ENABLED=true
      - ERROR_HANDLER_ENABLED=true
      
      # 瀹硶鍚堣閰嶇疆
      - CONSTITUTION_COMPLIANCE_ENABLED=true
      - CONSTITUTION_AUDIT_LOG_PATH=/app/logs/constitution-audit.jsonl
    volumes:
      - gateway-logs:/app/logs
      - constitution-audit-logs:/app/audit
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); const req = http.request('http://localhost:4514/health', {timeout: 5000}, (res) => {process.exit(res.statusCode === 200 ? 0 : 1)}); req.on('error', () => process.exit(1)); req.end()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    labels:
      - "org.negentropy.lab.component=gateway"
      - "org.negentropy.lab.environment=production"
      - "org.negentropy.lab.constitution.compliance=true"
      - "traefik.enable=true"
      - "traefik.http.routers.gateway.rule=Host(`gateway.negentropy-lab.org`)"
      - "traefik.http.services.gateway.loadbalancer.server.port=4514"

  # ========== Prometheus鐩戞帶 ==========
  prometheus:
    image: prom/prometheus:latest
    container_name: negentropy-prometheus-prod
    hostname: prometheus-prod
    ports:
      - "9090:9090"
    networks:
      - negentropy-production
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
      - ./monitoring/alerts/:/etc/prometheus/alerts/
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=720h'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "org.negentropy.lab.component=monitoring"
      - "org.negentropy.lab.environment=production"
  alertmanager:
    image: prom/alertmanager:latest
    container_name: negentropy-alertmanager-prod
    hostname: alertmanager
    ports:
      - "9093:9093"
    networks:
      - negentropy-production
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "org.negentropy.lab.component=monitoring"
      - "org.negentropy.lab.environment=production"
  # ========== Grafana浠〃鏉?==========
  grafana:
    image: grafana/grafana:latest
    container_name: negentropy-grafana-prod
    hostname: grafana-prod
    ports:
      - "3000:3000"
    networks:
      - negentropy-production
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/dashboards/:/etc/grafana/provisioning/dashboards/
      - ./monitoring/datasources/:/etc/grafana/provisioning/datasources/
    depends_on:
      - prometheus
      - alertmanager
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "org.negentropy.lab.component=monitoring"
      - "org.negentropy.lab.environment=production"

  # ========== 鏃ュ織鑱氬悎鍣?(鍙€? ==========
  loki:
    image: grafana/loki:latest
    container_name: negentropy-loki-prod
    hostname: loki-prod
    ports:
      - "3100:3100"
    networks:
      - negentropy-production
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/local-config.yaml
    labels:
      - "org.negentropy.lab.component=logging"
      - "org.negentropy.lab.environment=production"

  # ========== 瀹硶鍚堣鐩戞帶鏈嶅姟 ==========
  # ========== Nginx 统一入口代理 ==========
  nginx:
    image: nginx:alpine
    container_name: negentropy-nginx-prod
    hostname: nginx-prod
    ports:
      - "80:80"
    networks:
      - negentropy-production
    volumes:
      - ./monitoring/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
      - prometheus
      - alertmanager
      - grafana
      - loki
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 5s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    labels:
      - "org.negentropy.lab.component=proxy"
      - "org.negentropy.lab.environment=production"
      - "org.negentropy.lab.constitution.compliance=true"

  constitution-monitor:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: negentropy-constitution-monitor
    hostname: constitution-monitor
    networks:
      - negentropy-production
    environment:
      - NODE_ENV=production
      - MONITOR_TYPE=constitution
      - GATEWAY_URL=http://gateway:4514
      - PROMETHEUS_URL=http://prometheus:9090
      - ALERT_THRESHOLD=0.8
    command: ["node", "scripts/constitution-monitor.js"]
    depends_on:
      - gateway
      - prometheus
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); const req = http.request('http://localhost:8080/health', {timeout: 5000}, (res) => {process.exit(res.statusCode === 200 ? 0 : 1)}); req.on('error', () => process.exit(1)); req.end()"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "org.negentropy.lab.component=constitution-monitoring"
      - "org.negentropy.lab.environment=production"

# ========== 瀹硶鍚堣閮ㄧ讲绾︽潫 ==========
# 瀹硶渚濇嵁: 搂306闆跺仠鏈哄崗璁?- 婊氬姩鏇存柊绛栫暐
x-deploy-constraints: &deploy-constraints
  update_config:
    parallelism: 1
    delay: 10s
    order: start-first
    failure_action: rollback
  restart_policy:
    condition: on-failure
    delay: 5s
    max_attempts: 3
    window: 120s

# 瀹硶渚濇嵁: 搂102鐔靛噺鍘熷垯 - 璧勬簮闄愬埗浼樺寲
x-resource-limits: &resource-limits
  resources:
    limits:
      cpus: '1'
      memory: 1G
    reservations:
      cpus: '0.5'
      memory: 512M
